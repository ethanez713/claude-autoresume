# claude-autoresume tmux config (loaded only on the private CCAR socket via `-f`).
# Goal: render Claude Code's TUI correctly while keeping the operator's personal
# tmux habits. We inherit the user's ~/.tmux.conf first, then override only the
# terminal-capability bits that cause garbled scrollback / stuck-column artifacts.

# Inherit personal setup if present (prefix, mode-keys, mouse, indexing, etc.).
source-file -q ~/.tmux.conf

# --- rendering fixes ---------------------------------------------------------
# Inside tmux the terminal is NOT xterm. Advertising xterm caps (the common
# dotfile default) makes tmux emit sequences the real terminal mishandles —
# that's the garbled-on-scroll + repeated-leftmost-column artifact. tmux-256color
# is the terminfo entry written for exactly this inner-terminal role.
set -g default-terminal "tmux-256color"

# Truecolor: the outer terminal (Windows Terminal) supports RGB, but tmux won't
# pass 24-bit color through unless told, so the TUI's colors get quantized/mangled.
set -as terminal-features ",*:RGB"

# Roomier scrollback for long walk-away sessions.
set -g history-limit 50000

# --- terminal tab title ------------------------------------------------------
# Mirror Claude's title (status emoji + session summary) onto the outer terminal
# tab. Claude sets it via an OSC sequence, which tmux records as the pane title
# (#T) instead of forwarding it. set-titles pushes #T out to the real terminal;
# tmux emits the xterm OSC automatically because we attach as xterm-256color.
set -g set-titles on
set -g set-titles-string '#T'
